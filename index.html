<style>
:root{
  --gold:#C9A84C;--gold-dim:#8a6f2e;--sun:#F4C842;--ember:#E8623A;
  --bg2:#0b0a07;--stone:#111009;--deep:#181510;

}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg2)}
body{color:var(--light);font-family:'Crimson Text',Georgia,serif}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% -5%,#C9A84C0b 0%,transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:.5}
.app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen{max-width:520px;margin:0 auto;padding:22px 16px 100px;display:none}
.screen.active{display:block}
/* NAV */
.nav{background:#09080680;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid #1a1710;display:flex;flex-shrink:0;z-index:10}
.nb{flex:1;padding:10px 2px 15px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:7px;letter-spacing:1.5px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .3s}
.nb.active{color:var(--gold)}
.nb.active .ni{filter:drop-shadow(0 0 6px #C9A84C60)}
.ni{font-size:17px;line-height:1}
/* OPENING */
.opening{position:fixed;inset:0;background:var(--bg2);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;text-align:center}
.op-ico{width:64px;height:64px;margin:0 auto 20px;animation:rise 1.6s ease-out}
.op-ico img{width:100%;height:100%;object-fit:contain}
.op-runes{font-size:9px;color:var(--muted);letter-spacing:5px;margin-bottom:16px;animation:fi 2s .5s both}
.op-verse{font-size:15px;color:var(--dim);font-style:italic;line-height:2.3;margin-bottom:24px;white-space:pre-line;animation:fi 2s 1s both}
.op-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:36px;animation:fi 2s 1.6s both}
.op-btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);padding:13px 32px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;cursor:pointer;animation:fi 2s 2.1s both}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:#09080690;backdrop-filter:blur(16px);z-index:800;display:none;align-items:center;justify-content:center;padding:24px}
.modal-bg.on{display:flex}
.modal{background:var(--stone);border:1px solid var(--gold-dim);padding:32px 22px;max-width:320px;width:100%;text-align:center;animation:min .3s ease-out}
@keyframes min{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.m-ico{font-size:48px;margin-bottom:14px}
.m-ttl{font-family:'Cinzel',serif;font-size:18px;color:var(--gold);letter-spacing:3px;margin-bottom:3px}
.m-sub{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:14px;font-family:'Cinzel',serif}
.m-verse{font-size:13px;color:var(--dim);font-style:italic;line-height:2.1;margin-bottom:22px;white-space:pre-line}
.m-close{background:none;border:1px solid var(--gold-dim);color:var(--gold);padding:11px 26px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;cursor:pointer}
/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--stone);border:1px solid var(--gold-dim);color:var(--gold);padding:8px 20px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;z-index:700;white-space:nowrap;display:none}
/* SHARED */
.sl{font-family:'Cinzel',serif;font-size:8px;color:var(--muted);letter-spacing:3px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sl::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-g{background:none;border:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:6px 12px;cursor:pointer;transition:all .2s}
.btn-g:active,.btn-g.on{border-color:var(--gold-dim);color:var(--gold);background:#C9A84C08}
.btn-gold{background:none;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:12px 18px;cursor:pointer;width:100%}
.inp{width:100%;background:#ffffff03;border:1px solid var(--border);color:var(--light);font-family:'Crimson Text',Georgia,serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold-dim)}
.inp::placeholder{color:var(--muted);font-style:italic}
textarea.inp{resize:none;line-height:1.7}
.hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.tabs{display:flex;border:1px solid var(--border);margin-bottom:18px}
.tab{flex:1;padding:9px 2px;background:none;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'Cinzel',serif;font-size:7px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.tab:last-child{border-right:none}
.tab.active{color:var(--gold);background:#C9A84C06}
.panel{display:none}
.panel.active{display:block}
.back-btn{background:none;border:none;color:var(--muted);font-family:'Cinzel',serif;font-size:8px;letter-spacing:3px;padding:0 0 18px;cursor:pointer;display:block}
.form-lbl{font-family:'Cinzel',serif;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:5px;display:block;margin-top:10px}
.form-lbl:first-child{margin-top:0}
.form-sel{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--dim);font-family:'Crimson Text',serif;font-size:13px;padding:8px 10px;outline:none}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--border);cursor:pointer;font-size:11px}
/* HOME */
.crown{text-align:center;padding:8px 0 22px;margin-bottom:18px;border-bottom:1px solid #ffffff04}
.c-solm-ico{width:50px;height:50px;margin:0 auto 10px;animation:glow 6s ease-in-out infinite}
.c-solm-ico img{width:100%;height:100%;object-fit:contain}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 4px #C9A84C20)}50%{filter:drop-shadow(0 0 14px #C9A84C50)}}
.c-app-name{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:6px;margin-bottom:12px}
.c-name{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:3px}
.c-dharma{font-size:12px;color:var(--dim);font-style:italic;margin-bottom:10px}
